app = "nuprop"
primary_region = "bom"

[build]

[deploy]
  release_command = "cd /app/backend && alembic upgrade head"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/v1/health"
  timeout = "5s"

[mounts]
  source = "nuprop_data"
  destination = "/data"
  initial_size = "1"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
